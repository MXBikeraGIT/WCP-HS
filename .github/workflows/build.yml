name: Build vkd3d‑proton with Mali Hybrid Fallback

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Tag / commit (empty = latest master)'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies (cross‑compilation only)
        run: |
          sudo dpkg --add-architecture i386
          sudo mkdir -pm755 /etc/apt/keyrings
          sudo wget -O /etc/apt/keyrings/winehq-archive.key https://dl.winehq.org/wine-builds/winehq.key
          sudo wget -NP /etc/apt/sources.list.d/ https://dl.winehq.org/wine-builds/ubuntu/dists/noble/winehq-noble.sources
          sudo apt update
          sudo apt install -y --install-recommends winehq-stable
          sudo apt install -y meson ninja-build mingw-w64 mingw-w64-tools libvulkan-dev glslang-tools python3-pip git zstd
          pip3 install mako

      - name: Clone vkd3d‑proton
        run: |
          git clone https://github.com/HansKristian-Work/vkd3d-proton.git src
          cd src
          if [ -n "${{ github.event.inputs.version }}" ]; then
            git checkout ${{ github.event.inputs.version }}
          fi
          git submodule update --init --recursive

      - name: Apply Mali hybrid workaround
        run: |
          cd src
          sed -i '/if (strstr(device->vk_info.properties.deviceName, "Mali")) {/a\
              /* Enable vkd3d-proton fallback flags */\
              device->force_bindless_texel_buffer = true;\
              device->no_upload_hvv = true;\
              /* Reduce memory limits to avoid OOM on Mali */\
              if (device->vk_info.properties.limits.maxStorageBufferRange > 128 * 1024 * 1024)\
                  device->vk_info.properties.limits.maxStorageBufferRange = 128 * 1024 * 1024;\
              if (device->vk_info.properties.limits.maxStorageImageRange > 128 * 1024 * 1024)\
                  device->vk_info.properties.limits.maxStorageImageRange = 128 * 1024 * 1024;' libs/vkd3d/device.c
          echo "Mali workaround applied"

      - name: Build for x86_64 and x86
        run: |
          cd src
          mkdir -p build64 build32
          # 64-bit
          meson setup build64 --cross-file build-win64.txt --buildtype release
          meson compile -C build64
          # 32-bit
          meson setup build32 --cross-file build-win32.txt --buildtype release
          meson compile -C build32
          
          # Create a directory with the driver files (for the inner tar)
          mkdir -p driver_pkg
          # Copy 64-bit DLLs (try known paths, fallback to find)
          if [ -f build64/libs/vkd3d-proton/d3d12.dll ]; then
            cp build64/libs/vkd3d-proton/d3d12.dll driver_pkg/
            cp build64/libs/vkd3d-proton/d3d12core.dll driver_pkg/
          elif [ -f build64/libs/vkd3d/d3d12.dll ]; then
            cp build64/libs/vkd3d/d3d12.dll driver_pkg/
            cp build64/libs/vkd3d/d3d12core.dll driver_pkg/
          else
            find build64 -name "d3d12.dll" -exec cp {} driver_pkg/ \;
            find build64 -name "d3d12core.dll" -exec cp {} driver_pkg/ \;
          fi
          # Copy 32-bit DLLs
          if [ -f build32/libs/vkd3d-proton/d3d12.dll ]; then
            cp build32/libs/vkd3d-proton/d3d12.dll driver_pkg/
            cp build32/libs/vkd3d-proton/d3d12core.dll driver_pkg/
          elif [ -f build32/libs/vkd3d/d3d12.dll ]; then
            cp build32/libs/vkd3d/d3d12.dll driver_pkg/
            cp build32/libs/vkd3d/d3d12core.dll driver_pkg/
          else
            find build32 -name "d3d12.dll" -exec cp {} driver_pkg/ \;
            find build32 -name "d3d12core.dll" -exec cp {} driver_pkg/ \;
          fi
          # Create profile.json
          echo '{"type":"VKD3D","version":"mali-hybrid"}' > driver_pkg/profile.json
          
          # Create inner tar (vkd3d-proton-mali.tar) with files at root (./)
          tar -cf vkd3d-proton-mali.tar -C driver_pkg .
          # Compress that tar to .wcp using zstd (Winlator expects .wcp as zstd compressed tar)
          zstd -o vkd3d-proton-mali.wcp vkd3d-proton-mali.tar
          # Clean up
          rm -rf driver_pkg vkd3d-proton-mali.tar

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vkd3d-proton-mali
          path: src/vkd3d-proton-mali.wcp

      - name: Create GitHub Release (optional)
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: vkd3d-mali-${{ github.run_number }}
          name: vkd3d‑proton Mali Hybrid ${{ github.run_number }}
          files: src/vkd3d-proton-mali.wcp
          generate_release_notes: true
