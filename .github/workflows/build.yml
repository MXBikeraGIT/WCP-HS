name: Build vkd3d‑proton with Mali Hybrid Fallback

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Tag / commit (empty = latest master)'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo dpkg --add-architecture i386
          sudo mkdir -pm755 /etc/apt/keyrings
          sudo wget -O /etc/apt/keyrings/winehq-archive.key https://dl.winehq.org/wine-builds/winehq.key
          sudo wget -NP /etc/apt/sources.list.d/ https://dl.winehq.org/wine-builds/ubuntu/dists/noble/winehq-noble.sources
          sudo apt update
          sudo apt install -y --install-recommends winehq-stable
          sudo apt install -y meson ninja-build mingw-w64 mingw-w64-tools libvulkan-dev glslang-tools python3-pip git zstd
          pip3 install mako

      - name: Clone vkd3d‑proton
        run: |
          git clone https://github.com/HansKristian-Work/vkd3d-proton.git src
          cd src
          if [ -n "${{ github.event.inputs.version }}" ]; then
            git checkout ${{ github.event.inputs.version }}
          fi
          git submodule update --init --recursive

      - name: Apply Mali hybrid workaround (pretend missing extensions are present)
        run: |
          cd src
          # Force the extension to be considered supported by patching the check
          # Look for the line that prints "Lacking support for VK_EXT_vertex_attribute_divisor"
          # and replace the entire condition block to always succeed.
          # We'll also add fallback flags for good measure.
          sed -i '/Lacking support for VK_EXT_vertex_attribute_divisor/{n; s/return E_FAIL;/\/\/ return E_FAIL; \/* pretend supported *\/ return S_OK;/}' libs/vkd3d/device.c
          # Also add the fallback flags inside the Mali detection block
          sed -i '/if (strstr(device->vk_info.properties.deviceName, "Mali")) {/a\
              device->force_bindless_texel_buffer = true;\
              device->no_upload_hvv = true;\
              device->no_vertex_attribute_divisor = true;\
              if (device->vk_info.properties.limits.maxStorageBufferRange > 128 * 1024 * 1024)\
                  device->vk_info.properties.limits.maxStorageBufferRange = 128 * 1024 * 1024;\
              if (device->vk_info.properties.limits.maxStorageImageRange > 128 * 1024 * 1024)\
                  device->vk_info.properties.limits.maxStorageImageRange = 128 * 1024 * 1024;' libs/vkd3d/device.c
          echo "Mali workaround applied: missing extensions treated as present"

      - name: Build DLLs and create .wcp
        run: |
          cd src
          mkdir -p build64 build32
          # 64-bit
          meson setup build64 --cross-file build-win64.txt --buildtype release
          meson compile -C build64
          # 32-bit
          meson setup build32 --cross-file build-win32.txt --buildtype release
          meson compile -C build32

          mkdir -p driver_pkg/system32 driver_pkg/syswow64

          # Copy 64-bit DLLs
          if [ -f build64/libs/vkd3d-proton/d3d12.dll ]; then
            cp build64/libs/vkd3d-proton/d3d12.dll driver_pkg/system32/
            cp build64/libs/vkd3d-proton/d3d12core.dll driver_pkg/system32/
          elif [ -f build64/libs/vkd3d/d3d12.dll ]; then
            cp build64/libs/vkd3d/d3d12.dll driver_pkg/system32/
            cp build64/libs/vkd3d/d3d12core.dll driver_pkg/system32/
          else
            find build64 -name "d3d12.dll" -exec cp {} driver_pkg/system32/ \;
            find build64 -name "d3d12core.dll" -exec cp {} driver_pkg/system32/ \;
          fi

          # Copy 32-bit DLLs
          if [ -f build32/libs/vkd3d-proton/d3d12.dll ]; then
            cp build32/libs/vkd3d-proton/d3d12.dll driver_pkg/syswow64/
            cp build32/libs/vkd3d-proton/d3d12core.dll driver_pkg/syswow64/
          elif [ -f build32/libs/vkd3d/d3d12.dll ]; then
            cp build32/libs/vkd3d/d3d12.dll driver_pkg/syswow64/
            cp build32/libs/vkd3d/d3d12core.dll driver_pkg/syswow64/
          else
            find build32 -name "d3d12.dll" -exec cp {} driver_pkg/syswow64/ \;
            find build32 -name "d3d12core.dll" -exec cp {} driver_pkg/syswow64/ \;
          fi

          cat > driver_pkg/profile.json << 'EOF'
          {
            "type": "VKD3D",
            "versionName": "2.14.1-arm64ec",
            "versionCode": 0,
            "description": "Built on the Winlator WCP Hub (Upstream: Hans-Kristian Arntzen)",
            "files": [
              {
                "source": "system32/d3d12.dll",
                "target": "${system32}/d3d12.dll"
              },
              {
                "source": "system32/d3d12core.dll",
                "target": "${system32}/d3d12core.dll"
              },
              {
                "source": "syswow64/d3d12.dll",
                "target": "${syswow64}/d3d12.dll"
              },
              {
                "source": "syswow64/d3d12core.dll",
                "target": "${syswow64}/d3d12core.dll"
              }
            ]
          }
          EOF

          tar -cf vkd3d-proton-mali.tar -C driver_pkg .
          zstd -o vkd3d-proton-mali.wcp vkd3d-proton-mali.tar
          rm -rf driver_pkg vkd3d-proton-mali.tar

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vkd3d-proton-mali
          path: src/vkd3d-proton-mali.wcp
